<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#e94560">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KS Production">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <title>Aperçu — {{ evt.titre }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#1a1a2e; font-family:'Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column; }
        .toolbar {
            background:#0f0f1e; padding:10px 20px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:2px solid #e94560; flex-shrink:0;
        }
        .toolbar .left { display:flex; align-items:center; gap:12px; }
        .toolbar h6 { color:#fff; font-size:.88rem; margin:0; }
        .toolbar .meta { color:rgba(255,255,255,.4); font-size:.72rem; }
        .actions { display:flex; gap:8px; }
        .btn-dl {
            background:#e94560; color:#fff; border:none;
            padding:7px 16px; border-radius:8px; font-size:.82rem;
            cursor:pointer; text-decoration:none;
            display:flex; align-items:center; gap:6px;
        }
        .btn-dl:hover { background:#c0392b; color:#fff; }
        .btn-back {
            background:rgba(255,255,255,.1); color:#fff; border:none;
            padding:7px 14px; border-radius:8px; font-size:.82rem;
            cursor:pointer; text-decoration:none;
            display:flex; align-items:center; gap:6px;
            transition:background .2s;
        }
        .btn-back:hover { background:rgba(255,255,255,.2); color:#fff; }
        iframe { flex:1; width:100%; border:none; background:#fff; }
            @media (max-width: 480px) {
            .toolbar { flex-direction: column; gap: 8px; align-items: flex-start; }
            .toolbar h6 { font-size: .78rem; }
            .actions { width: 100%; }
            .btn-dl, .btn-back { font-size: .75rem; padding: 5px 10px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="left">
            <a href="/agenda" class="btn-back">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
            <div>
                <h6><i class="bi bi-file-earmark-pdf me-2" style="color:#e94560;"></i>{{ evt.titre }}</h6>
                <div class="meta">Fiche de prestation · {{ evt.date.strftime('%d/%m/%Y') }}</div>
            </div>
        </div>
        <div class="actions">
            <a href="data:application/pdf;base64,{{ pdf_b64 }}"
               download="{{ filename }}" class="btn-dl">
                <i class="bi bi-download"></i> Télécharger PDF
            </a>
        </div>
    </div>
    <iframe src="data:application/pdf;base64,{{ pdf_b64 }}"
            type="application/pdf"></iframe>
    <!-- Service Worker PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW enregistré:', reg.scope))
            .catch(err => console.log('SW erreur:', err));
        });
      }
    </script>
</body>
</html>
